name: Release

on:
  push:
    tags:
    - "v*"
  workflow_call:
    inputs:
      release_tag:
        description: Tag to publish
        required: false
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish; defaults to the current ref or latest tag
        required: false
        type: string

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag || github.ref }}
    - name: Determine release tag
      id: tag
      env:
        INPUT_TAG: ${{ inputs.release_tag }}
      run: |
        if [ -n "$INPUT_TAG" ]; then
          tag="$INPUT_TAG"
        elif [[ "$GITHUB_REF" = refs/tags/* ]]; then
          tag="$GITHUB_REF_NAME"
        else
          tag="$(git describe --tags --abbrev=0)"
        fi

        echo "value=$tag" >> "$GITHUB_OUTPUT"
    - name: Skip if release already exists
      id: existing_release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ steps.tag.outputs.value }}
      run: |
        if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "exists=false" >> "$GITHUB_OUTPUT"
    - uses: cli/gh-extension-precompile@v2
      if: steps.existing_release.outputs.exists != 'true'
      with:
        generate_attestations: true
        go_version_file: go.mod
        release_tag: ${{ steps.tag.outputs.value }}
