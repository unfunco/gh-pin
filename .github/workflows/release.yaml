name: Release

on:
  push:
    tags:
    - "v*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: cli/gh-extension-precompile@v2
      with:
        generate_attestations: true
        go_version_file: go.mod
